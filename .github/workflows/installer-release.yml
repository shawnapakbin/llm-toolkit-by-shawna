name: Installer Release

on:
  workflow_dispatch:
  push:
    tags:
      - "installer-v*"

permissions:
  contents: write

jobs:
  build-installer:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck installer
        run: npm run -w Installer typecheck

      - name: Build installer app
        run: npm run -w Installer build

      - name: Package installer
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            npm run -w Installer dist:win
          elif [ "${{ runner.os }}" = "macOS" ]; then
            npm run -w Installer dist:mac
          else
            npm run -w Installer dist:linux
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ runner.os }}
          path: |
            Installer/release/install*.exe
            Installer/release/install*.dmg
            Installer/release/install*.AppImage
          if-no-files-found: error

      - name: Generate checksums
        shell: bash
        run: |
          cd Installer/release
          if compgen -G "install*.exe" > /dev/null || compgen -G "install*.dmg" > /dev/null || compgen -G "install*.AppImage" > /dev/null; then
            shasum -a 256 install*.exe install*.dmg install*.AppImage 2>/dev/null > checksums-${{ runner.os }}.txt || true
          fi

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums-${{ runner.os }}
          path: Installer/release/checksums-${{ runner.os }}.txt
          if-no-files-found: ignore

  publish-release:
    if: startsWith(github.ref, 'refs/tags/installer-v')
    needs: build-installer
    runs-on: ubuntu-latest
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/install*.exe
            artifacts/**/install*.dmg
            artifacts/**/install*.AppImage
            artifacts/**/checksums-*.txt
